<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}ToDoManager{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'task_list' %}">
                ToDoManager
            </a>

            <div class="d-flex gap-2 align-items-center">
                {% if user.is_authenticated %}
                    <span class="text-light">
                        {{ user.username }}
                    </span>

                    <a class="btn btn-outline-light btn-sm" href="{% url 'task_create' %}">
                        Создать задачу
                    </a>

                    <form method="post" action="{% url 'logout' %}">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-outline-warning btn-sm">
                            Выйти
                        </button>
                    </form>
                {% else %}
                    <a class="btn btn-outline-light btn-sm" href="{% url 'login' %}">
                        Войти
                    </a>

                    <a class="btn btn-warning btn-sm" href="{% url 'register' %}">
                        Регистрация
                    </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
