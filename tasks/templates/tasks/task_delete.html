{% extends 'tasks/base.html' %}

{% block title %}Удалить задачу{% endblock %}

{% block content %}
    <section class="danger-panel">
        <p class="eyebrow eyebrow--danger">Подтверждение</p>
        <h1>Удалить задачу?</h1>

        <p>
            Вы точно хотите удалить задачу
            <strong>{{ task.title }}</strong>?
        </p>

        <form method="post" class="form-actions">
            {% csrf_token %}

            <button type="submit" class="action-link action-link--danger">
                Да, удалить
            </button>

            <a href="{% url 'task_list' %}" class="action-link action-link--muted">
                Отмена
            </a>
        </form>
    </section>
{% endblock %}
