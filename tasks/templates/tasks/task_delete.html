{% extends 'tasks/base.html' %}

{% block title %}Удалить задачу{% endblock %}

{% block content %}
    <div class="card border-danger">
        <div class="card-body">
            <h1 class="card-title text-danger">
                Удалить задачу?
            </h1>

            <p class="card-text">
                Ты точно хочешь удалить задачу:
                <strong>{{ task.title }}</strong>?
            </p>

            <form method="post">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Да, удалить
                </button>

                <a href="{% url 'task_list' %}" class="btn btn-secondary">
                    Отмена
                </a>
            </form>
        </div>
    </div>
{% endblock %}
